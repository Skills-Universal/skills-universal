name: Check skill updates from upstream sources

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 UTC
  workflow_dispatch:      # Manual trigger from GitHub UI

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check upstream skill SHAs
        env:
          GITHUB_TOKEN: ${{ secrets.SKILLS_CHECK_TOKEN }}
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/check_skill_updates.py
